title: Revenue & Subscriptions
description: MRR trends, plan economics, and subscription lifecycle

queries:
  rev_kpis:
    sql: |
      SELECT
        ROUND(SUM(net_mrr), 0) as total_net_mrr,
        ROUND(SUM(new_mrr), 0) as total_new_mrr,
        ROUND(SUM(expansion_mrr), 0) as total_expansion,
        ROUND(SUM(churn_mrr), 0) as total_churn
      FROM revenue

  mrr_by_plan:
    sql: |
      SELECT month, plan, net_mrr, active_subscriptions
      FROM revenue WHERE plan != 'free' ORDER BY month, plan

  mrr_net_trend:
    sql: |
      SELECT month, SUM(net_mrr) as net_mrr
      FROM revenue GROUP BY month ORDER BY month

  mrr_composition:
    sql: |
      SELECT month, 'New MRR' as component, SUM(new_mrr) as amount FROM revenue GROUP BY month
      UNION ALL
      SELECT month, 'Expansion MRR', SUM(expansion_mrr) FROM revenue GROUP BY month
      UNION ALL
      SELECT month, 'Churn MRR', -SUM(churn_mrr) FROM revenue GROUP BY month
      ORDER BY month, component

  plan_summary:
    sql: |
      SELECT plan, ROUND(SUM(net_mrr), 0) as total_mrr,
        SUM(active_subscriptions) as total_sub_months,
        ROUND(AVG(net_mrr), 0) as avg_monthly_mrr
      FROM revenue GROUP BY plan ORDER BY total_mrr DESC

  sub_status:
    sql: |
      SELECT status, COUNT(*) as count
      FROM subscriptions GROUP BY status ORDER BY count DESC

  churn_by_plan:
    sql: |
      SELECT s.plan, COUNT(*) as churned,
        ROUND(COUNT(*) * 100.0 / (SELECT COUNT(*) FROM subscriptions s2 WHERE s2.plan = s.plan), 1) as churn_pct
      FROM subscriptions s WHERE s.status = 'cancelled'
      GROUP BY s.plan ORDER BY churn_pct DESC

  ticket_stats:
    sql: |
      SELECT category, COUNT(*) as total,
        SUM(CASE WHEN status = 'resolved' THEN 1 ELSE 0 END) as resolved,
        ROUND(AVG(first_response_hours), 1) as avg_response_hrs,
        ROUND(SUM(CASE WHEN status = 'resolved' THEN 1 ELSE 0 END) * 100.0 / COUNT(*), 1) as resolution_rate
      FROM support_tickets GROUP BY category ORDER BY total DESC

layout:
  - row:
    - big-value: { data: rev_kpis, value: total_net_mrr, title: Net MRR }
    - big-value: { data: rev_kpis, value: total_new_mrr, title: New MRR }
    - big-value: { data: rev_kpis, value: total_expansion, title: Expansion MRR }
    - big-value: { data: rev_kpis, value: total_churn, title: Churn MRR }
  - row:
    - chart: mrr_trend
    - chart: mrr_plan
  - row:
    - chart: mrr_comp
  - row:
    - chart: sub_status
    - chart: churn
  - row:
    - table: plan_summary
  - row:
    - table: ticket_stats

charts:
  mrr_trend:
    data: mrr_net_trend
    title: Net MRR Over Time
    preset: line
    spec:
      encoding:
        x: { field: month, type: temporal, timeUnit: yearmonth }
        y: { field: net_mrr, type: quantitative }

  mrr_plan:
    data: mrr_by_plan
    title: MRR by Plan
    preset: stacked-column
    spec:
      encoding:
        x: { field: month, type: temporal, timeUnit: yearmonth }
        y: { field: net_mrr, type: quantitative }
        color: { field: plan, type: nominal }

  mrr_comp:
    data: mrr_composition
    title: New vs Expansion vs Churn MRR
    preset: stacked-column
    spec:
      encoding:
        x: { field: month, type: temporal, timeUnit: yearmonth }
        y: { field: amount, type: quantitative }
        color: { field: component, type: nominal }

  sub_status:
    data: sub_status
    title: Subscription Status
    preset: stacked-column
    spec:
      encoding:
        x: { field: status, type: nominal }
        y: { field: count, type: quantitative }

  churn:
    data: churn_by_plan
    title: Churn Rate by Plan (%)
    preset: stacked-column
    spec:
      encoding:
        x: { field: plan, type: nominal }
        y: { field: churn_pct, type: quantitative }

tables:
  plan_summary:
    data: plan_summary
    title: Revenue by Plan
  ticket_stats:
    data: ticket_stats
    title: Ticket Stats by Category
