title: Executive Metrics
description: SaaS business health — accounts, revenue, retention, and growth

queries:
  # ── KPI Row 1: Account Health ──────────────────────────────────
  account_health_kpis:
    sql: |
      WITH cur AS (
        SELECT
          COUNT(*) FILTER (WHERE status = 'active')  AS active_accounts,
          COUNT(*) FILTER (WHERE status = 'active' AND converted_date IS NOT NULL) AS paid_accounts,
          COUNT(*) FILTER (WHERE signup_date >= DATE '2025-06-01') AS new_accounts_30d,
          COUNT(*) FILTER (WHERE churned_date >= DATE '2025-06-01') AS churned_accounts_30d
        FROM accounts
      ),
      prev AS (
        SELECT
          COUNT(*) FILTER (WHERE status IN ('active','churned') AND signup_date < DATE '2025-06-01' AND (churned_date IS NULL OR churned_date >= DATE '2025-06-01')) AS prev_active,
          COUNT(*) FILTER (WHERE (status IN ('active','churned')) AND converted_date IS NOT NULL AND converted_date < DATE '2025-06-01' AND (churned_date IS NULL OR churned_date >= DATE '2025-06-01')) AS prev_paid,
          COUNT(*) FILTER (WHERE signup_date >= DATE '2025-05-01' AND signup_date < DATE '2025-06-01') AS prev_new_30d,
          COUNT(*) FILTER (WHERE churned_date >= DATE '2025-05-01' AND churned_date < DATE '2025-06-01') AS prev_churned_30d
        FROM accounts
      )
      SELECT
        cur.active_accounts,
        cur.paid_accounts,
        cur.new_accounts_30d,
        cur.churned_accounts_30d,
        cur.active_accounts - prev.prev_active AS active_accounts_delta,
        cur.paid_accounts  - prev.prev_paid   AS paid_accounts_delta,
        cur.new_accounts_30d - prev.prev_new_30d AS new_accounts_30d_delta,
        cur.churned_accounts_30d - prev.prev_churned_30d AS churned_accounts_30d_delta
      FROM cur, prev

  # ── KPI Row 2: Revenue ─────────────────────────────────────────
  revenue_kpis:
    sql: |
      WITH arr_cur AS (
        SELECT COALESCE(SUM(mrr), 0) * 12 AS arr
        FROM subscriptions WHERE status = 'active'
      ),
      new_arr AS (
        SELECT
          COALESCE(SUM(mrr_delta) FILTER (WHERE event_type = 'new' AND DATE_TRUNC('month', event_date) = DATE '2025-06-01'), 0) * 12 AS new_arr_month,
          COALESCE(SUM(mrr_delta) FILTER (WHERE event_type = 'new' AND DATE_TRUNC('month', event_date) = DATE '2025-05-01'), 0) * 12 AS prev_new_arr_month
        FROM subscription_events
      ),
      churned_arr AS (
        SELECT
          COALESCE(SUM(ABS(mrr_delta)) FILTER (WHERE event_type = 'churn'), 0) * 12 AS churned_arr_total,
          COALESCE(SUM(ABS(mrr_delta)) FILTER (WHERE event_type = 'churn' AND DATE_TRUNC('month', event_date) = DATE '2025-06-01'), 0) * 12 AS churned_arr_month,
          COALESCE(SUM(ABS(mrr_delta)) FILTER (WHERE event_type = 'churn' AND DATE_TRUNC('month', event_date) = DATE '2025-05-01'), 0) * 12 AS prev_churned_arr_month
        FROM subscription_events
      )
      SELECT
        ROUND(arr_cur.arr) AS arr,
        COALESCE((SELECT ROUND(SUM(mrr_delta) * 12) FROM subscription_events WHERE event_date >= DATE '2025-06-01'), 0)
          - COALESCE((SELECT ROUND(SUM(mrr_delta) * 12) FROM subscription_events WHERE event_date >= DATE '2025-05-01' AND event_date < DATE '2025-06-01'), 0) AS arr_delta,
        ROUND(new_arr.new_arr_month) AS new_arr_month,
        ROUND(new_arr.new_arr_month - new_arr.prev_new_arr_month) AS new_arr_month_delta,
        ROUND(churned_arr.churned_arr_total) AS churned_arr_total,
        ROUND(churned_arr.churned_arr_month) AS churned_arr_month,
        ROUND(churned_arr.churned_arr_month - churned_arr.prev_churned_arr_month) AS churned_arr_month_delta
      FROM arr_cur, new_arr, churned_arr

  # ── Chart 1: ARR Growth ────────────────────────────────────────
  arr_growth:
    sql: |
      WITH months AS (
        SELECT UNNEST(GENERATE_SERIES(DATE '2024-01-01', DATE '2025-06-01', INTERVAL '1' MONTH)) AS month
      ),
      running AS (
        SELECT
          m.month,
          COALESCE(SUM(se.mrr_delta), 0) AS month_net
        FROM months m
        LEFT JOIN subscription_events se
          ON DATE_TRUNC('month', se.event_date) = m.month
        GROUP BY m.month
      )
      SELECT
        month,
        ROUND(SUM(month_net) OVER (ORDER BY month) * 12) AS arr
      FROM running
      ORDER BY month

  # ── Chart 2: Net New MRR ───────────────────────────────────────
  net_new_mrr:
    sql: |
      SELECT
        DATE_TRUNC('month', event_date) AS month,
        CASE event_type
          WHEN 'new' THEN 'New'
          WHEN 'expansion' THEN 'Expansion'
          WHEN 'reactivation' THEN 'New'
          WHEN 'downgrade' THEN 'Downgrade'
          WHEN 'churn' THEN 'Churn'
        END AS component,
        SUM(mrr_delta) AS mrr
      FROM subscription_events
      GROUP BY 1, 2
      ORDER BY month, component

  # ── Chart 3: MRR Waterfall by Component ────────────────────────
  mrr_waterfall:
    sql: |
      WITH months AS (
        SELECT UNNEST(GENERATE_SERIES(DATE '2024-01-01', DATE '2025-06-01', INTERVAL '1' MONTH)) AS month
      )
      SELECT
        m.month,
        se.event_type AS component,
        ROUND(SUM(se.mrr_delta)) AS mrr
      FROM months m
      JOIN subscription_events se
        ON DATE_TRUNC('month', se.event_date) = m.month
      GROUP BY m.month, se.event_type
      ORDER BY m.month, se.event_type

  # ── Chart 4: MRR by Segment ────────────────────────────────────
  mrr_by_segment:
    sql: |
      WITH seg_events AS (
        SELECT
          DATE_TRUNC('month', se.event_date) AS month,
          a.segment,
          SUM(se.mrr_delta) AS mrr_delta
        FROM subscription_events se
        JOIN accounts a ON a.id = se.account_id
        GROUP BY 1, 2
      ),
      months AS (
        SELECT UNNEST(GENERATE_SERIES(DATE '2024-01-01', DATE '2025-06-01', INTERVAL '1' MONTH)) AS month
      ),
      segments AS (
        SELECT UNNEST(['smb', 'mid-market', 'enterprise']) AS segment
      ),
      grid AS (
        SELECT m.month, s.segment FROM months m CROSS JOIN segments s
      )
      SELECT
        g.month,
        g.segment,
        COALESCE(SUM(COALESCE(se.mrr_delta, 0)) OVER (
          PARTITION BY g.segment ORDER BY g.month
        ), 0) AS cumulative_mrr
      FROM grid g
      LEFT JOIN seg_events se ON se.month = g.month AND se.segment = g.segment
      ORDER BY g.month, g.segment

  # ── Chart 5: Trial-to-Paid Conversion Rate ─────────────────────
  trial_conversion:
    sql: |
      WITH months AS (
        SELECT UNNEST(GENERATE_SERIES(DATE '2024-01-01', DATE '2025-06-01', INTERVAL '1' MONTH)) AS month
      ),
      cohorts AS (
        SELECT
          DATE_TRUNC('month', trial_start_date) AS cohort_month,
          COUNT(*) AS trials,
          COUNT(converted_date) AS conversions
        FROM accounts
        WHERE trial_start_date IS NOT NULL
        GROUP BY 1
      )
      SELECT
        m.month,
        ROUND(c.conversions * 100.0 / GREATEST(c.trials, 1), 1) AS conversion_rate
      FROM months m
      JOIN cohorts c ON c.cohort_month = m.month
      ORDER BY m.month

  # ── Chart 6: Retention Rate by Quarterly Cohort ─────────────────
  retention_cohort:
    sql: |
      WITH cohort_accounts AS (
        SELECT
          a.id AS account_id,
          DATE_TRUNC('quarter', a.converted_date) AS cohort_q,
          a.converted_date
        FROM accounts a
        WHERE a.converted_date IS NOT NULL
      ),
      months AS (
        SELECT UNNEST(GENERATE_SERIES(DATE '2024-01-01', DATE '2025-06-01', INTERVAL '1' MONTH)) AS month
      ),
      cohort_months AS (
        SELECT
          ca.account_id,
          ca.cohort_q,
          m.month,
          EXTRACT(MONTH FROM AGE(m.month, ca.cohort_q))
            + EXTRACT(YEAR FROM AGE(m.month, ca.cohort_q)) * 12 AS months_since
        FROM cohort_accounts ca
        CROSS JOIN months m
        WHERE m.month >= ca.cohort_q
      ),
      active_check AS (
        SELECT
          cm.cohort_q,
          cm.months_since,
          cm.account_id,
          CASE WHEN EXISTS (
            SELECT 1 FROM subscriptions s
            WHERE s.account_id = cm.account_id
              AND s.start_date <= cm.month + INTERVAL '1' MONTH - INTERVAL '1' DAY
              AND (s.end_date IS NULL OR s.end_date >= cm.month)
          ) THEN 1 ELSE 0 END AS is_active
        FROM cohort_months cm
      ),
      cohort_sizes AS (
        SELECT cohort_q, COUNT(DISTINCT account_id) AS cohort_size
        FROM cohort_accounts
        GROUP BY 1
      )
      SELECT
        CAST(ac.cohort_q AS VARCHAR) AS cohort,
        ac.months_since::INTEGER AS months_since,
        ROUND(SUM(ac.is_active) * 100.0 / MAX(cs.cohort_size), 1) AS retention_pct
      FROM active_check ac
      JOIN cohort_sizes cs ON cs.cohort_q = ac.cohort_q
      WHERE ac.months_since >= 0
      GROUP BY ac.cohort_q, ac.months_since
      HAVING MAX(cs.cohort_size) >= 10
      ORDER BY ac.cohort_q, ac.months_since

  # ── Chart 7: Churn Rate by Segment ─────────────────────────────
  churn_by_segment:
    sql: |
      WITH months AS (
        SELECT UNNEST(GENERATE_SERIES(DATE '2024-03-01', DATE '2025-06-01', INTERVAL '1' MONTH)) AS month
      )
      SELECT
        m.month,
        a.segment,
        ROUND(100.0 *
          COUNT(DISTINCT CASE
            WHEN a.churned_date >= m.month AND a.churned_date < m.month + INTERVAL '1' MONTH
            THEN a.id END)
          / NULLIF(COUNT(DISTINCT CASE
            WHEN a.converted_date < m.month
              AND (a.churned_date IS NULL OR a.churned_date >= m.month)
            THEN a.id END), 0), 1) AS churn_rate
      FROM months m
      CROSS JOIN accounts a
      WHERE a.converted_date IS NOT NULL
        AND a.converted_date < m.month + INTERVAL '1' MONTH
      GROUP BY m.month, a.segment
      HAVING COUNT(DISTINCT CASE
        WHEN a.converted_date < m.month AND (a.churned_date IS NULL OR a.churned_date >= m.month)
        THEN a.id END) >= 5
      ORDER BY m.month, a.segment

  # ── Chart 8: ASP Trend ─────────────────────────────────────────
  asp_trend:
    sql: |
      WITH months AS (
        SELECT UNNEST(GENERATE_SERIES(DATE '2024-01-01', DATE '2025-06-01', INTERVAL '1' MONTH)) AS month
      ),
      new_subs AS (
        SELECT
          DATE_TRUNC('month', se.event_date) AS month,
          se.mrr_after AS initial_mrr
        FROM subscription_events se
        WHERE se.event_type = 'new'
      )
      SELECT
        m.month,
        ROUND(AVG(ns.initial_mrr)) AS asp
      FROM months m
      JOIN new_subs ns ON ns.month = m.month
      GROUP BY m.month
      ORDER BY m.month

  # ── Chart 9: Estimated Cohort LTV ──────────────────────────────
  cohort_ltv:
    sql: |
      WITH cohort_accounts AS (
        SELECT
          a.id AS account_id,
          DATE_TRUNC('quarter', a.converted_date) AS cohort_q
        FROM accounts a
        WHERE a.converted_date IS NOT NULL
          AND DATE_TRUNC('quarter', a.converted_date) <= DATE '2025-01-01'
      ),
      revenue AS (
        SELECT
          se.account_id,
          SUM(CASE WHEN se.mrr_delta > 0 THEN se.mrr_delta ELSE 0 END) AS total_positive_mrr
        FROM subscription_events se
        GROUP BY se.account_id
      )
      SELECT
        CAST(ca.cohort_q AS VARCHAR) AS cohort,
        ROUND(AVG(COALESCE(r.total_positive_mrr, 0))) AS avg_ltv
      FROM cohort_accounts ca
      LEFT JOIN revenue r ON r.account_id = ca.account_id
      GROUP BY ca.cohort_q
      HAVING COUNT(*) >= 5
      ORDER BY ca.cohort_q

  # ── Chart 10: Expansion Revenue % ──────────────────────────────
  expansion_pct:
    sql: |
      WITH months AS (
        SELECT UNNEST(GENERATE_SERIES(DATE '2024-01-01', DATE '2025-06-01', INTERVAL '1' MONTH)) AS month
      ),
      monthly AS (
        SELECT
          DATE_TRUNC('month', se.event_date) AS month,
          COALESCE(SUM(se.mrr_delta) FILTER (WHERE se.event_type = 'expansion'), 0) AS expansion_mrr,
          COALESCE(SUM(se.mrr_delta) FILTER (WHERE se.event_type IN ('new', 'expansion', 'reactivation')), 0) AS positive_mrr
        FROM subscription_events se
        GROUP BY 1
      )
      SELECT
        m.month,
        ROUND(
          CASE WHEN mo.positive_mrr > 0
            THEN mo.expansion_mrr * 100.0 / mo.positive_mrr
            ELSE 0
          END, 1
        ) AS expansion_pct
      FROM months m
      JOIN monthly mo ON mo.month = m.month
      ORDER BY m.month

  # ── Table: Top Accounts ─────────────────────────────────────────
  top_accounts:
    sql: |
      SELECT
        a.name AS account_name,
        a.industry,
        a.segment,
        s.mrr AS current_mrr,
        s.start_date
      FROM accounts a
      JOIN subscriptions s ON s.account_id = a.id AND s.status = 'active'
      ORDER BY s.mrr DESC
      LIMIT 20

layout:
  # KPI Row 1 — Account Health
  - row:
    - big-value: { data: account_health_kpis, value: active_accounts, title: Active Accounts, format: num0, comparison: active_accounts_delta, comparisonFormat: num0, isUpGood: true }
    - big-value: { data: account_health_kpis, value: paid_accounts, title: Paid Accounts, format: num0, comparison: paid_accounts_delta, comparisonFormat: num0, isUpGood: true }
    - big-value: { data: account_health_kpis, value: new_accounts_30d, title: "New Accounts (30d)", format: num0, comparison: new_accounts_30d_delta, comparisonFormat: num0, isUpGood: true }
    - big-value: { data: account_health_kpis, value: churned_accounts_30d, title: "Churned Accounts (30d)", format: num0, comparison: churned_accounts_30d_delta, comparisonFormat: num0, isUpGood: false }

  # KPI Row 2 — Revenue
  - row:
    - big-value: { data: revenue_kpis, value: arr, title: ARR, format: usd0, comparison: arr_delta, comparisonFormat: usd0, isUpGood: true }
    - big-value: { data: revenue_kpis, value: new_arr_month, title: "New ARR (This Month)", format: usd0, comparison: new_arr_month_delta, comparisonFormat: usd0, isUpGood: true }
    - big-value: { data: revenue_kpis, value: churned_arr_total, title: "Churned ARR (All Time)", format: usd0 }
    - big-value: { data: revenue_kpis, value: churned_arr_month, title: "Churned ARR (This Month)", format: usd0, comparison: churned_arr_month_delta, comparisonFormat: usd0, isUpGood: false }

  # Chart Row 1
  - row:
    - chart: arr_growth_chart
    - chart: net_new_mrr_chart

  # Chart Row 2
  - row:
    - chart: mrr_waterfall_chart
    - chart: mrr_by_segment_chart

  # Chart Row 3
  - row:
    - chart: trial_conversion_chart
    - chart: retention_cohort_chart

  # Chart Row 4
  - row:
    - chart: churn_by_segment_chart
    - chart: asp_trend_chart

  # Chart Row 5
  - row:
    - chart: cohort_ltv_chart
    - chart: expansion_pct_chart

  # Table Row
  - row:
    - table: top_accounts_table

charts:
  arr_growth_chart:
    data: arr_growth
    title: ARR Growth
    preset: line
    spec:
      encoding:
        x: { field: month, type: temporal, timeUnit: yearmonth }
        y: { field: arr, type: quantitative }

  net_new_mrr_chart:
    data: net_new_mrr
    title: Net New MRR
    preset: stacked-column
    spec:
      encoding:
        x: { field: month, type: temporal, timeUnit: yearmonth }
        y: { field: mrr, type: quantitative }
        color: { field: component, type: nominal }

  mrr_waterfall_chart:
    data: mrr_waterfall
    title: MRR Waterfall by Component
    preset: stacked-column
    spec:
      encoding:
        x: { field: month, type: temporal, timeUnit: yearmonth }
        y: { field: mrr, type: quantitative }
        color: { field: component, type: nominal }

  mrr_by_segment_chart:
    data: mrr_by_segment
    title: MRR by Segment
    preset: stacked-area
    spec:
      encoding:
        x: { field: month, type: temporal, timeUnit: yearmonth }
        y: { field: cumulative_mrr, type: quantitative }
        color: { field: segment, type: nominal }

  trial_conversion_chart:
    data: trial_conversion
    title: Trial-to-Paid Conversion Rate
    preset: line
    spec:
      encoding:
        x: { field: month, type: temporal, timeUnit: yearmonth }
        y: { field: conversion_rate, type: quantitative }

  retention_cohort_chart:
    data: retention_cohort
    title: Retention Rate by Cohort
    preset: line
    spec:
      encoding:
        x: { field: months_since, type: quantitative }
        y: { field: retention_pct, type: quantitative }
        color: { field: cohort, type: nominal }

  churn_by_segment_chart:
    data: churn_by_segment
    title: Churn Rate by Segment
    preset: line
    spec:
      encoding:
        x: { field: month, type: temporal, timeUnit: yearmonth }
        y: { field: churn_rate, type: quantitative }
        color: { field: segment, type: nominal }

  asp_trend_chart:
    data: asp_trend
    title: ASP Trend
    preset: line
    spec:
      encoding:
        x: { field: month, type: temporal, timeUnit: yearmonth }
        y: { field: asp, type: quantitative }

  cohort_ltv_chart:
    data: cohort_ltv
    title: Estimated Cohort LTV
    preset: grouped-column
    spec:
      encoding:
        x: { field: cohort, type: nominal }
        y: { field: avg_ltv, type: quantitative }

  expansion_pct_chart:
    data: expansion_pct
    title: Expansion Revenue %
    preset: line
    spec:
      encoding:
        x: { field: month, type: temporal, timeUnit: yearmonth }
        y: { field: expansion_pct, type: quantitative }

tables:
  top_accounts_table:
    data: top_accounts
    title: Top Accounts by ARR
